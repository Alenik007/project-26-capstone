services:
  backend:
    build:
      context: ./backend
    container_name: interview_backend
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: interview_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://13.60.91.191/api
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: interview_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: interview_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:

